<p>A hostname is a user-friendly, human-readable name that can be used to refer to devices on the network. A hostname must:</p>
<ul>
    <li>Be 63 characters or less</li>
    <li>Only contain the characters A-Z, a-z, 0-9, and '-'</li>
    <li>Not start or end with a '-'</li>
    <li>Not be all numbers</li>
</ul>
